version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nik-postgres
    environment:
      POSTGRES_USER: nik_user
      POSTGRES_PASSWORD: nik_password
      POSTGRES_DB: nik_streamx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nik_user -d nik_streamx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: nik-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-31T00-00-00Z
    container_name: nik-minio
    environment:
      MINIO_ROOT_USER: nik_minio_admin
      MINIO_ROOT_PASSWORD: nik_minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  auth-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE_PATH: services/auth-service
    container_name: nik-auth-service
    environment:
      PORT: "8081"
    ports:
      - "8081:8081"

  source-resolver:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE_PATH: services/source-resolver
    container_name: nik-source-resolver
    environment:
      PORT: "8082"
    ports:
      - "8082:8082"

  media-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE_PATH: services/media-service
    container_name: nik-media-service
    environment:
      PORT: "8083"
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE_PATH: services/api-gateway
    container_name: nik-api-gateway
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      RESOLVER_SERVICE_URL: "http://source-resolver:8082"
      MEDIA_SERVICE_URL: "http://media-service:8083"
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - source-resolver
      - media-service
